<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3366"/>
      <stop offset="100%" stop-color="#FF6B6B"/>
    </linearGradient>
  </defs>
  <!-- maskable safe zone: artwork must fit within centered 80% (icon scaled to 60% of canvas) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <g transform="translate(102.4, 102.4) scale(0.6)">
    <polyline points="64,288 144,288 192,160 256,352 320,224 368,288 448,288" fill="none" stroke="url(#pulse)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="256" cy="256" r="32" fill="#FF3366" opacity="0.6"/>
  </g>
</svg>
